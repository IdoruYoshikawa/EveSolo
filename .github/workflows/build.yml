name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyinstaller Pillow

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name EVESolo EveSolo.py

      - name: Sign with signtool (self-signed)
        run: |
          # Create a self-signed certificate
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=EVE Solo" -CertStoreLocation Cert:\CurrentUser\My
          # Sign the exe
          Set-AuthenticodeSignature -FilePath "dist\EVESolo.exe" -Certificate $cert -TimestampServer "http://timestamp.digicert.com"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EVE-Solo
          path: dist/EVESolo.exe
